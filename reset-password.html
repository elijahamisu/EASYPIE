<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Password | EASYPIE - Premium Naira Investments</title>
    <meta name="description" content="Set a new password for your EASYPIE account and regain access to your investments.">
    
    <!-- Favicon -->
    <link rel="icon" href="public/favicon.ico" type="image/x-icon">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="assets/css/main.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-4);
            background-color: var(--gray-50);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
        }

        .auth-logo {
            display: flex;
            justify-content: center;
            margin-bottom: var(--space-8);
        }

        .auth-logo a {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.5rem;
            font-size: 0.875rem;
            transition: var(--transition-base);
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .strength-meter {
            height: 4px;
            width: 100%;
            background-color: var(--gray-200);
            border-radius: var(--radius-full);
            margin-top: var(--space-2);
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: var(--transition-smooth);
        }

        .strength-text {
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: var(--space-1);
            display: block;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="index.html">
                <i class="fas fa-pie-chart"></i> EASYPIE
            </a>
        </div>

        <!-- Reset Card -->
        <div class="card shadow-premium">
            <h1 class="text-center m-b-2">Set New Password</h1>
            <p class="text-sm text-center text-muted m-b-8">Please enter your new password below. Make it strong to protect your account.</p>

            <!-- Alert Containers -->
            <div id="auth-alert" class="alert alert-error hidden" role="alert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alert-message"></span>
            </div>
            
            <div id="auth-success" class="alert alert-success hidden" role="alert">
                <i class="fas fa-check-circle"></i>
                <span>Password successfully reset! Redirecting to login...</span>
            </div>

            <!-- Form -->
            <form id="reset-password-form" novalidate>
                <div class="form-group">
                    <label for="new-password" class="label">New Password</label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="new-password" 
                            class="input" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="new-password"
                        >
                        <i class="fas fa-eye toggle-password" data-target="new-password"></i>
                    </div>
                    <div class="strength-meter">
                        <div id="strength-bar" class="strength-bar"></div>
                    </div>
                    <span id="strength-text" class="strength-text text-muted">Password Strength</span>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="label">Confirm New Password</label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="confirm-password" 
                            class="input" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="new-password"
                        >
                        <i class="fas fa-eye toggle-password" data-target="confirm-password"></i>
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit" id="reset-password-btn" class="btn btn-primary btn-full">
                    <span id="btn-text">Update Password</span>
                    <div id="btn-loader" class="spinner hidden"></div>
                </button>
            </form>

            <!-- Footer Links -->
            <div class="m-t-8 text-center" style="border-top: 1px solid var(--gray-200); padding-top: var(--space-6);">
                <p class="text-sm m-b-2">Back to <a href="login.html" class="font-bold text-primary" style="text-decoration: none;">Login</a></p>
                <a href="index.html" class="text-xs text-muted" style="text-decoration: none;"><i class="fas fa-arrow-left m-r-1"></i> Back to Homepage</a>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="text-center m-t-8">
            <p class="text-xs text-muted">&copy; 2026 EASYPIE Investments. Secure & Regulated.</p>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
    
    <!-- Page Specific Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('reset-password-form');
            const passwordInput = document.getElementById('new-password');
            const confirmInput = document.getElementById('confirm-password');
            const strengthBar = document.getElementById('strength-bar');
            const strengthText = document.getElementById('strength-text');
            const toggleBtns = document.querySelectorAll('.toggle-password');
            const alertBox = document.getElementById('auth-alert');
            const alertMsg = document.getElementById('alert-message');

            // 1. Show/Hide Password
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    const isPassword = input.getAttribute('type') === 'password';
                    input.setAttribute('type', isPassword ? 'text' : 'password');
                    btn.classList.toggle('fa-eye');
                    btn.classList.toggle('fa-eye-slash');
                });
            });

            // 2. Strength Meter Logic
            passwordInput.addEventListener('input', () => {
                const val = passwordInput.value;
                let strength = 0;
                
                if (val.length >= 6) strength += 25;
                if (val.match(/[a-z]/) && val.match(/[A-Z]/)) strength += 25;
                if (val.match(/[0-9]/)) strength += 25;
                if (val.match(/[^a-zA-Z0-9]/)) strength += 25;

                strengthBar.style.width = strength + '%';
                
                if (strength <= 25) {
                    strengthBar.style.backgroundColor = 'var(--danger)';
                    strengthText.textContent = 'Weak';
                    strengthText.className = 'strength-text text-danger';
                } else if (strength <= 75) {
                    strengthBar.style.backgroundColor = 'var(--warning)';
                    strengthText.textContent = 'Medium';
                    strengthText.className = 'strength-text text-warning';
                } else {
                    strengthBar.style.backgroundColor = 'var(--success)';
                    strengthText.textContent = 'Strong';
                    strengthText.className = 'strength-text text-primary';
                }
            });

            // 3. Client-side matching check
            form.addEventListener('submit', (e) => {
                const pass = passwordInput.value;
                const conf = confirmInput.value;

                if (pass !== conf) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    alertBox.classList.remove('hidden');
                    alertMsg.textContent = 'Passwords do not match.';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (pass.length < 6) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    alertBox.classList.remove('hidden');
                    alertMsg.textContent = 'Password must be at least 6 characters.';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alertBox.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
