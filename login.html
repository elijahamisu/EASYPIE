<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | EASYPIE - Premium Naira Investments</title>
    <meta name="description" content="Access your EASYPIE account to manage your Naira investments and track daily earnings.">
    
    <!-- Favicon -->
    <link rel="icon" href="public/favicon.ico" type="image/x-icon">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="assets/css/main.css">
    
    <style>
        /* Specific layout for authentication pages to ensure centering */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-4);
            background-color: var(--gray-50);
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
        }

        .auth-logo {
            display: flex;
            justify-content: center;
            margin-bottom: var(--space-8);
        }

        .auth-logo a {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.5rem;
            font-size: 0.875rem;
            transition: var(--transition-base);
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* Prevent layout shift during loading */
        #btn-loader.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="index.html">
                <i class="fas fa-pie-chart"></i> EASYPIE
            </a>
        </div>

        <!-- Login Card -->
        <div class="card shadow-premium">
            <h1 class="text-center m-b-2">Welcome Back</h1>
            <p class="text-sm text-center text-muted m-b-8">Enter your credentials to access your investment dashboard.</p>

            <!-- Alert Containers -->
            <div id="auth-alert" class="alert alert-error hidden" role="alert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alert-message"></span>
            </div>
            
            <div id="auth-success" class="alert alert-success hidden" role="alert">
                <i class="fas fa-check-circle"></i>
                <span>Login successful! Redirecting...</span>
            </div>

            <!-- Login Form -->
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email" class="label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="input" 
                        placeholder="e.g. name@example.com" 
                        required 
                        autocomplete="email"
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <div class="flex justify-between items-center m-b-2">
                        <label for="password" class="label m-b-0">Password</label>
                        <a href="forgot-password.html" class="text-xs font-bold text-primary" style="text-decoration: none;">Forgot Password?</a>
                    </div>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="password" 
                            class="input" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="current-password"
                            aria-required="true"
                        >
                        <i class="fas fa-eye toggle-password" id="toggle-password" aria-label="Toggle password visibility"></i>
                    </div>
                </div>

                <div class="flex items-center gap-2 m-b-8">
                    <input type="checkbox" id="remember" style="width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;">
                    <label for="remember" class="text-sm text-muted" style="cursor: pointer;">Remember me on this device</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="login-btn" class="btn btn-primary btn-full">
                    <span id="btn-text">Log In to Account</span>
                    <div id="btn-loader" class="spinner hidden"></div>
                </button>
            </form>

            <!-- Registration Link -->
            <div class="m-t-8 text-center" style="border-top: 1px solid var(--gray-200); padding-top: var(--space-6);">
                <p class="text-sm">Don't have an account? <a href="register.html" class="font-bold text-primary" style="text-decoration: none;">Create Account</a></p>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="text-center m-t-8">
            <p class="text-xs text-muted">&copy; 2026 EASYPIE Investments. Secure & Encrypted Connection.</p>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
    
    <!-- Page Specific Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            const loginForm = document.getElementById('login-form');

            // 1. Password Visibility Toggle
            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', () => {
                    const isPassword = passwordInput.getAttribute('type') === 'password';
                    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                    toggleBtn.classList.toggle('fa-eye');
                    toggleBtn.classList.toggle('fa-eye-slash');
                });
            }

            // 2. Client-side Validation helper
            loginForm.addEventListener('submit', (e) => {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const alertBox = document.getElementById('auth-alert');
                const alertMsg = document.getElementById('alert-message');

                if (!email || !password) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    alertBox.classList.remove('hidden');
                    alertMsg.textContent = 'Please fill in all fields.';
                }
            });
        });
    </script>
</body>
</html>
